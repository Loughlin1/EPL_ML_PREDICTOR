name: Python Pytest CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'sqlite:///./epl.db' }}
          FOOTBALL_DATA_BASE_URL: ${{ secrets.FOOTBALL_DATA_BASE_URL || '' }}
          SUPERBRU_TARGET_URL: ${{ secrets.SUPERBRU_TARGET_URL || '' }}
          SUPERBRU_USERNAME: ${{ secrets.SUPERBRU_USERNAME || '' }}
          SUPERBRU_PASSWORD: ${{ secrets.SUPERBRU_PASSWORD || '' }}
        run: python -m pytest tests/ --disable-warnings -v
